# Scheduler config for autonomous agents

[[jobs]]
id = "social-daily"
agent_name = "social-media"
task = "Post daily summary to social media"
enabled = true
priority = 1
max_retries = 3
retry_delay_secs = 60

[jobs.trigger]
expression = "0 9 * * * *"
timezone = "America/Sao_Paulo"

[[jobs]]
id = "msg-webhook"
agent_name = "messaging"
task = "Send message via webhook trigger"
enabled = true
priority = 5
max_retries = 2
retry_delay_secs = 30

[jobs.trigger]
endpoint = "/trigger/messaging"

[[jobs]]
id = "research-weekly"
agent_name = "research"
task = "Weekly research report"
enabled = true
priority = 2
max_retries = 3
retry_delay_secs = 120

[jobs.trigger]
expression = "0 6 * * 1"
timezone = "America/Sao_Paulo"
